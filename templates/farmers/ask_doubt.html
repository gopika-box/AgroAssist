{% extends "farmers/dashboard.html" %}



{% block content %}
<h2>Ask a Doubt</h2>

{% if messages %}
  {% for message in messages %}
    <div class="mb-4 p-3 rounded
                {% if message.tags == 'success' %}
                  bg-green-100 text-green-800
                {% elif message.tags == 'error' %}
                  bg-red-100 text-red-800
                {% endif %}">
      {{ message }}
    </div>
  {% endfor %}
{% endif %}

<form method="post">
  {% csrf_token %}

  <label class="block font-semibold mb-2">
    Enter your doubt
  </label>

  <textarea
    name="question"
    rows="4"
    class="w-full border rounded p-3"
    placeholder="Type your agricultural doubt here..."
    required
  ></textarea>

  <button
    type="submit"
    class="mt-4 bg-green-600 text-white px-6 py-2 rounded hover:bg-green-700"
  >
    Submit Doubt
  </button>
</form>


{% endblock content %}
