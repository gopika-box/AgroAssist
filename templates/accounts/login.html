{% extends "base.html" %}

{% block content %}

<div class="flex justify-center items-center min-h-[70vh]">
    <div class="w-full max-w-md bg-white shadow-lg rounded-xl p-8">

        <!-- Title -->
        <h2 class="text-2xl font-bold text-center text-green-700 mb-6">
            Login to AgroAssist
        </h2>

        <!-- Error Message -->
        {% if error %}
            <div class="mb-4 text-sm text-red-600 bg-red-100 border border-red-300 rounded px-4 py-2">
                {{ error }}
            </div>
        {% endif %}

        <!-- Login Form -->
        <form method="POST" class="space-y-4">
            {% csrf_token %}

            <!-- Username -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">
                    Username / Unique_Id
                </label>
                <input
                    type="text"
                    name="username"
                    required
                    class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500"
                >
            </div>

            <!-- Password -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">
                    Password
                </label>
                <input
                    type="password"
                    name="password"
                    required
                    class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500"
                >
            </div>

            <!-- Submit Button -->
            <button
                type="submit"
                class="w-full bg-green-600 hover:bg-green-700 text-white font-semibold py-2 rounded-lg transition duration-200"
            >
                Login
            </button>
        </form>

    </div>
</div>


{% comment %} <form method="POST">
        {% csrf_token %}

        <label>Username:</label><br>
        <input type="text" name="username" required><br><br>

        <label>Password:</label><br>
        <input type="password" name="password" required><br><br>

        <button type="submit">Login</button>
    </form> {% endcomment %}


{% endblock content %}
