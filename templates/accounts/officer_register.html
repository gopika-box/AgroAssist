{% extends "base.html" %}
{% block content %}

<div class="flex justify-center items-center">
<div class="w-full max-w-lg bg-white shadow-xl rounded-lg p-8">

<h2 class="text-2xl font-bold text-center text-green mb-6">Officer Registration</h2>

<marquee class="text-green-600">Your account will be activated after admin approval.</marquee>

<form method="POST" class="space-y-4">
    {% csrf_token %}
    <label class=" text-sm font-medium text-gray-700 mb-2">Unique Id: </label><br>
    <input type="text" name="uniqueId" class="w-full px-4 py-1 border rounded-lg " required><br><br>

    <label>Name:</label><br>
    <input type="text" name="username" class="w-full px-4 py-1 border rounded-lg" required><br><br>

    <label>Panchayat:</label><br>
    <input type="text" name="panchayat" class="w-full px-4 py-1 border rounded-lg" required><br><br>
    <label>Phone Number:</label>
    <input type="text" name="phone" class="w-full px-4 py-1 border rounded-lg"  required>
    <label>Email:</label>
    <input type="email" name="email" class="w-full px-4 py-1 border rounded-lg"  required>


    <label>Password:</label><br>
    <input type="password" name="password" class="w-full px-4 py-1 border rounded-lg" required><br><br>
    <label>Confirm Password:</label>
    <input type="password" name="confirm_password" class="w-full px-4 py-1 border rounded-lg"  required>

    

    <button type="submit" class="bg-green-600 py-2 px-2 rounded-lg text-white ">Register</button>
</form>
</div>
</div>
{% endblock content %}
