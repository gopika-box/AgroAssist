{% extends "base.html" %}

{% block content %}
<div class="flex justify-center items-center ">
    <div class= "w-full max-w-md bg-white shadow-xl rounded-lg p-8">
    
<h2 class ="text-2xl font-bold text-center text-green mb-6">Farmer Registration</h2>

<form method="POST" class="space-y-4">
    {% csrf_token %}

    <label class= "block text-sm font-medium text-gray-700 mb-0">Name:</label><br>
    <input type="text" name="username" class="w-full px-4 py-2 border rounded-lg focus:outline-none
    focus:ring-1
    focus:ring-green-500 " required><br><br>

    <label class="block text-sm font-medium text-gray-700 mb-0">Email:</label><br>

    <input type="email" name="email" class="w-full px-4 py-2 border rounded-lg 
    focus: outline-none focus:ring-1 focus:ring-green-500"
    required><br><br>


    <label>Password:</label><br>
    <input type="password" name="password" class= "w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-1
    focus:ring-green-500" required><br><br>

    <button type="submit" class="w-full bg-green-600 hover:bg-green-700 text-white font-semibold py-2  rounded-lg transition duration-200">Register

    </button>

</form>

Already have an account? <a href="/accounts/login/" class="underline text-blue -200"> Login</a>

</div>
</div>
{% endblock content %}
