{% extends "base.html" %}
{% load static %}

{% block title %}Join AgroAssist | Farmer Registration{% endblock %}

{% block extra_css %}
<style>
    /* Vibrant Mesh Gradient Background */
    .mesh-bg {
        background-color: #ffffff;
        background-image: 
            radial-gradient(at 0% 0%, rgba(16, 185, 129, 0.1) 0px, transparent 50%),
            radial-gradient(at 100% 100%, rgba(5, 150, 105, 0.15) 0px, transparent 50%),
            radial-gradient(at 100% 0%, rgba(209, 250, 229, 0.2) 0px, transparent 50%);
    }

    /* Input Floating Effect */
    .input-group:focus-within label {
        color: #059669;
        transform: translateX(4px);
    }

    .input-premium {
        background: rgba(255, 255, 255, 0.9);
        backdrop-filter: blur(8px);
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        border: 2px solid #f3f4f6;
    }

    .input-premium:focus {
        background: #ffffff;
        border-color: #10b981;
        box-shadow: 0 10px 25px -5px rgba(16, 185, 129, 0.15);
        transform: scale(1.01);
    }
</style>
{% endblock %}

{% block content %}
<div class="min-h-screen mesh-bg flex items-center justify-center py-16 px-6">
    <div class="max-w-3xl w-full">
        
        <div class="text-center mb-12 animate-pop">
            <div class="inline-flex items-center gap-2 px-4 py-2 rounded-2xl bg-white shadow-sm border border-green-100 mb-6">
                <span class="flex h-3 w-3">
                  <span class="animate-ping absolute inline-flex h-3 w-3 rounded-full bg-green-400 opacity-75"></span>
                  <span class="relative inline-flex rounded-full h-3 w-3 bg-green-500"></span>
                </span>
                <span class="text-xs font-black uppercase tracking-[0.2em] text-green-700">New Farmer Enrollment</span>
            </div>
            <h2 class="text-5xl lg:text-7xl font-black text-gray-900 tracking-tighter leading-none mb-4">
                Let's get you <br><span class="text-green-600">growing.</span>
            </h2>
        </div>

        <div class="bg-white/80 backdrop-blur-xl shadow-[0_32px_64px_-16px_rgba(0,0,0,0.1)] rounded-[3rem] border border-white p-8 lg:p-14 relative overflow-hidden">
            
            <div class="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-green-400 via-emerald-500 to-teal-400"></div>

            <form method="POST" class="grid grid-cols-1 md:grid-cols-2 gap-x-8 gap-y-6">
                {% csrf_token %}

                <div class="input-group">
                    <label class="block text-xs font-black uppercase tracking-widest text-gray-400 mb-2 transition-all">First Name</label>
                    <input type="text" name="first_name" required placeholder="Gopika"
                        class="input-premium w-full px-6 py-4 rounded-2xl focus:outline-none font-bold text-gray-800">
                </div>

                <div class="input-group">
                    <label class="block text-xs font-black uppercase tracking-widest text-gray-400 mb-2 transition-all">Last Name</label>
                    <input type="text" name="last_name" required placeholder="Vinu"
                        class="input-premium w-full px-6 py-4 rounded-2xl focus:outline-none font-bold text-gray-800">
                </div>

                <div class="input-group md:col-span-2">
                    <label class="block text-xs font-black uppercase tracking-widest text-gray-400 mb-2 transition-all">Email Address</label>
                    <input type="email" name="email" required placeholder="gopika@example.com"
                        class="input-premium w-full px-6 py-4 rounded-2xl focus:outline-none font-bold text-gray-800">
                </div>

                <div class="input-group">
                    <label class="block text-xs font-black uppercase tracking-widest text-gray-400 mb-2 transition-all">Phone</label>
                    <input type="text" name="phone" required placeholder="9876543210"
                        class="input-premium w-full px-6 py-4 rounded-2xl focus:outline-none font-bold text-gray-800">
                </div>

                <div class="input-group">
                    <label class="block text-xs font-black uppercase tracking-widest text-gray-400 mb-2 transition-all">Panchayat</label>
                    <input type="text" name="panchayat" required placeholder="Local Area"
                        class="input-premium w-full px-6 py-4 rounded-2xl focus:outline-none font-bold text-gray-800">
                </div>

                <div class="input-group">
                    <label class="block text-xs font-black uppercase tracking-widest text-gray-400 mb-2 transition-all">Password</label>
                    <input type="password" name="password" required
                        class="input-premium w-full px-6 py-4 rounded-2xl focus:outline-none font-bold text-gray-800">
                </div>

                <div class="input-group">
                    <label class="block text-xs font-black uppercase tracking-widest text-gray-400 mb-2 transition-all">Confirm</label>
                    <input type="password" name="confirm_password" required
                        class="input-premium w-full px-6 py-4 rounded-2xl focus:outline-none font-bold text-gray-800">
                </div>

                <div class="md:col-span-2 pt-6">
                    <button type="submit" 
                        class="group w-full bg-gray-900 text-white font-black text-xl py-5 rounded-3xl transition-all hover:bg-green-600 hover:shadow-[0_20px_40px_-10px_rgba(16,185,129,0.5)] active:scale-95 flex items-center justify-center gap-3">
                        <span>Register Now</span>
                        <span class="group-hover:translate-x-1 transition-transform">→</span>
                    </button>
                    
                    <p class="mt-8 text-center text-gray-400 font-medium">
                        Already have an account? 
                        <a href="{% url 'accounts:login' %}" class="text-green-600 hover:text-green-500 font-black border-b-2 border-green-100 hover:border-green-500 transition-all ml-1">Log in here</a>
                    </p>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
