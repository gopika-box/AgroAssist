{% extends "admin/dashboard.html" %}

{% block title %}Edit Course{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">

  <h2 class="text-3xl font-bold text-green-700 mb-6">✏️ Edit Course</h2>

  <div class="bg-white rounded-2xl shadow p-6">
    <form method="POST" class="space-y-4">
      {% csrf_token %}

      <div>
        <label class="block text-sm font-medium text-gray-700">Title</label>
        <input type="text" name="title" value="{{ course.title }}" required
               class="mt-1 w-full border rounded-lg px-3 py-2 focus:ring-2 focus:ring-green-500">
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700">Description</label>
        <textarea name="description" rows="4"
                  class="mt-1 w-full border rounded-lg px-3 py-2 focus:ring-2 focus:ring-green-500">{{ course.description }}</textarea>
      </div>

      <div class="flex justify-end gap-3">
        <a href="{% url 'accounts:admin_courses' %}"
           class="px-4 py-2 rounded-lg border text-gray-600 hover:bg-gray-50">
           Cancel
        </a>
        <button type="submit"
                class="px-5 py-2 bg-green-600 hover:bg-green-700 text-white rounded-lg shadow">
          Save Changes
        </button>
      </div>
    </form>
  </div>

</div>
{% endblock %}
