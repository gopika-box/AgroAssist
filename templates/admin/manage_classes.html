{% extends "admin/dashboard.html" %}

{% block content %}

<h2 class="text-2xl font-bold mb-6">
  Classes for: {{ course.title }}
</h2>

<table class="w-full bg-white rounded shadow">
  <thead class="bg-green-600 text-white">
    <tr>
      <th class="p-3 text-left">Title</th>
      <th class="p-3 text-left">Type</th>
      <th class="p-3 text-left">Actions</th>
    </tr>
  </thead>

  <tbody>
    {% for lesson in lessons %}
    <tr class="border-b">
      <td class="p-3">{{ lesson.title }}</td>
      <td class="p-3">{{ lesson.lesson_type }}</td>

      <td class="p-3 space-x-2">
        <a href="/accounts/admin/lessons/{{ lesson.id }}/edit/"
           class="text-blue-600">Edit</a>

        <a href="/accounts/admin/lessons/{{ lesson.id }}/delete/"
           class="text-red-600">Delete</a>
      </td>
    </tr>
    {% empty %}
    <tr>
      <td colspan="3" class="p-3 text-gray-500">
        No classes added yet.
      </td>
    </tr>
    {% endfor %}
  </tbody>
</table>

{% endblock %}
