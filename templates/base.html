<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    
    <title>{% block title %}AgroAssist{% endblock %}</title>

    <!-- Global CSS -->


    {% block extra_css %}{% endblock %}

</head>
<body class="min-h-screen flex flex-col bg-gray-50 text-gray-800">

    <!-- HEADER / NAVBAR -->
    <header class=" bg-green-700 text-white shadow-md">
        <nav class="flex items-center justify-between w-full max-w-7xl mx-auto px-6 py-4">    
            <div>
            <h2 class="text-2xl font-bold tracking-wide">
                <a href="landing">AgroAssist</a> </h2>
            </div>

        <ul class="flex items-center gap-8">
            {% comment %} <li class="hover:text-green-200 transition"> <a href="/" >Home</a></li> {% endcomment %}
        {% block nav %}
            {% endblock %}  
        </ul>
            
        </nav>
    </header>

    <!-- MAIN CONTENT -->
    <main class="flex-grow max-w-7xl mx-auto w-full px-6 py-10">
        {% block content %}
        {% endblock %}
    </main>

    <!-- FOOTER -->
    <footer class="bg-gray-800 text-gray-300 text-center py-4 text-sm">
        <p>&copy; 2025 AgroAssist. All rights reserved.</p>
    </footer>

</body>
</html>
