{% extends "officers/dashboard.html" %}

{% block content %}

<h1 class="text-2xl font-bold mb-6 text-green-700">
  Manage Classes
</h1>

<!-- ADD COURSE -->
<div class="bg-white p-6 rounded shadow mb-8">
  <h2 class="text-lg font-semibold mb-4">Add New Course</h2>

  <form method="post">
    {% csrf_token %}
    <input type="text" name="course_title" required
           placeholder="Course Title"
           class="w-full mb-3 p-2 border rounded">

    <textarea name="course_description"
              placeholder="Description"
              class="w-full mb-3 p-2 border rounded"></textarea>

    <button name="add_course"
            class="bg-green-700 text-white px-4 py-2 rounded hover:bg-green-800">
      Add Course
    </button>
  </form>
</div>

<!-- ADD LESSON -->
<div class="bg-white p-6 rounded shadow">

  <h2 class="text-lg font-semibold mb-4">Add Lesson</h2>

  <!-- Messages -->
  {% if messages %}
    {% for message in messages %}
      <div class="mb-4 p-3 rounded
        {% if message.tags == 'error' %}bg-red-100 text-red-700{% endif %}
        {% if message.tags == 'success' %}bg-green-100 text-green-700{% endif %}">
        {{ message }}
      </div>
    {% endfor %}
  {% endif %}

  <form method="post" enctype="multipart/form-data">
    {% csrf_token %}

    <!-- Course -->
    <select name="course" required
            class="w-full mb-3 p-2 border rounded">
      <option value="">Select Course</option>
      {% for course in courses %}
        <option value="{{ course.id }}">{{ course.title }}</option>
      {% endfor %}
    </select>

    <!-- Title -->
    <input type="text" name="lesson_title" required
           placeholder="Lesson Title"
           class="w-full mb-3 p-2 border rounded">

    <!-- Type -->
    <select name="lesson_type" id="lesson_type"
            onchange="toggleLessonInputs()"
            class="w-full mb-3 p-2 border rounded">
      <option value="">Select Type</option>
      <option value="video">Video</option>
      <option value="notes">Notes</option>
    </select>

    <!-- VIDEO URL -->
    <input type="url" name="video_url" id="videoInput"
           placeholder="Paste YouTube URL or Upload a Video file below"
           class="w-full mb-3 p-2 border rounded hidden">

    <!-- VIDEO FILE -->
    <input type="file" name="video_file" id="videoFileInput"
           accept="video/mp4"
           class="w-full mb-3 p-2 border rounded hidden">

    <!-- NOTES FILE -->
    <input type="file" name="notes_file" id="notesInput"
           accept="application/pdf"
           class="w-full mb-3 p-2 border rounded hidden">

    <!-- DESCRIPTION -->
    <textarea name="description"
              placeholder="Lesson Description"
              class="w-full mb-3 p-2 border rounded"></textarea>

    <!-- BUTTON -->
    <button name="add_lesson"
            class="bg-green-700 text-white px-4 py-2 rounded hover:bg-green-800">
      Add Lesson
    </button>

  </form>
</div>

<!-- JS SCRIPT -->
<script>
function toggleLessonInputs() {
    const type = document.getElementById("lesson_type").value;

    const videoInput = document.getElementById("videoInput");
    const videoFileInput = document.getElementById("videoFileInput");
    const notesInput = document.getElementById("notesInput");

    // Hide all
    videoInput.classList.add("hidden");
    videoFileInput.classList.add("hidden");
    notesInput.classList.add("hidden");

    // Show based on type
    if (type === "video") {
        videoInput.classList.remove("hidden");
        videoFileInput.classList.remove("hidden");
    }

    if (type === "notes") {
        notesInput.classList.remove("hidden");
    }
}

// Run on page load (IMPORTANT)
document.addEventListener("DOMContentLoaded", function () {
    toggleLessonInputs();
});
</script>

{% endblock %}
