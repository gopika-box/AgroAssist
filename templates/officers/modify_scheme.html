{% extends "officers/dashboard.html" %}
{% block content %}

<h2 class="text-2xl font-bold mb-6">Modify Government Scheme</h2>

<form method="post" enctype="multipart/form-data"
      class="bg-white p-6 rounded shadow">

  {% csrf_token %}

  <!-- TITLE -->
  <label class="block mb-2 font-semibold">Title</label>
  <input type="text" name="title"
         value="{{ scheme.title }}"
         class="w-full p-2 border rounded mb-4" required>

  <!-- DESCRIPTION -->
  <label class="block mb-2 font-semibold">Description</label>
  <textarea name="description"
            class="w-full p-2 border rounded mb-4"
            required>{{ scheme.description }}</textarea>

  <!-- ELIGIBILITY -->
  <label class="block mb-2 font-semibold">Eligibility</label>
  <textarea name="eligibility"
            class="w-full p-2 border rounded mb-4"
            required>{{ scheme.eligibility }}</textarea>

  <!-- DEADLINE -->
  <label class="block mb-2 font-semibold">Deadline</label>
  <input type="date" name="deadline"
         value="{{ scheme.deadline|date:'Y-m-d' }}"
         class="w-full p-2 border rounded mb-4" required>

  <!-- PDF -->

  <label class="block mb-2 font-semibold">Scheme PDF</label>

{% if scheme.scheme_pdf %}
  <p class="mb-2 text-sm">
    Current PDF:
    <a href="{{ scheme.scheme_pdf.url }}" target="_blank"
       class="text-green-700 underline font-semibold">
      View PDF
    </a>
  </p>
{% endif %}

<!-- Hidden real input -->
<input type="file" id="schemePdfInput"
       name="scheme_pdf"
       accept="application/pdf"
       class="hidden">

<!-- Custom upload button -->
<label for="schemePdfInput"
       class="inline-flex items-center gap-2 px-4 py-2
              bg-gray-100 border border-gray-300
              rounded-lg cursor-pointer
              hover:bg-gray-200 transition">
  📄 Upload New PDF
</label>

<!-- File name display -->
<span id="pdfFileName"
      class="ml-3 text-sm text-gray-600">
  No file selected
</span>


  <!-- ACTION BUTTONS -->
  <div class="flex gap-4 mt-6">

    <!-- UPDATE -->
    <button type="submit" name="update_scheme"
            class="bg-green-700 text-white px-4 py-2 rounded hover:bg-green-800">
      Update Scheme
    </button>

    <!-- DELETE -->
    <button type="submit" name="delete_scheme"
            onclick="return confirm('Are you sure you want to delete this scheme?');"
            class="bg-red-600 text-white px-4 py-2 rounded hover:bg-red-700">
      Delete Scheme
    </button>

    <!-- CANCEL -->
    <a href="{% url 'officers:view_schemes' %}"
       class="px-4 py-2 border rounded text-gray-700">
      Cancel
    </a>

  </div>

</form>

{% endblock %}
